{% extends 'partials/base.html' %}
{% block title %}Login Page{% endblock %}
{% load crispy_forms_tags %}
{% block content %}
<div class="cover">
<div class="container">
    <div class="row mt-5 pt-3"> 
        <div class="col-md-5 offset-md-6">
            <div class="card my-3 shadow">
                <div class="card-body">
                    <h4>Login Page</h4>
                    <hr>
                    <!-- <form method="POST"> -->
                        <!-- {% csrf_token %} -->
                        <!-- {{ form | crispy }} -->
<form method="POST" autocomplete="off">
    {% csrf_token %}

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <div class="form-group">
        <input type="text" name="username" class="form-control" placeholder="Enter Username" autocomplete="off">
    </div>

    <div class="form-group mt-2">
        <input type="password" name="password" class="form-control" placeholder="Enter Password" autocomplete="new-password" required>
    </div>

    <input class="btn btn-primary btn-block mt-3" type="submit" value="Login">
</form>
                       
                    <hr>
                    <div class="text-center my-3"> 
                        <a href="{% url 'password_reset' %}">Forget Password</a>
                    </div>
                    <div class="text-center">
                        <a class="btn btn-success" href="{% url 'users-sign-up' %}">Create An Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
{% endblock %}
